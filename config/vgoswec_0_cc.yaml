# vgoswec_0_cc.yaml
# Source: Ogden et al., ASME JOMAE 145(3):030905 (VGOSWEC-0 / VGM-0).
# VGM-0 hinge-frame resonance: ωn = 0.9929 rad/s (I_hinge=0.6788 kg·m², K_eff=6.57 N·m/rad).
# Complex-conjugate (CC) reactive control at design frequency ω₀ = ωn (impedance match).
#
# τ = -K_r · θ  -  B_r · θ̇
#
# Gains computed from HydroData at startup (impedance.h):
#   K_r = ω₀² · (I_flap + A₅₅(ω₀)) - K_hs_eff  (K_hs_eff = K_hs55 + C_ext)
#   B_r =  B_rad,55(ω₀)
#
# At ω₀ = ωn (hinge resonance): K_r ≈ 0, B_r = B55(ωn) > 0 (pure absorption).
#
# NOTE: VGM-0 has meaningful radiation damping B55(ωn) at hinge resonance,
# so CC is expected to absorb positive net power at its design frequency.
#
# WARNING: CC control requires bidirectional power flow (reactive);
#   a physical PTO must support this (e.g., active hydraulic or electric).
#
# NOTE: design_omega was corrected from 0.8763 to 0.9929 rad/s after fixing the
# T-vs-ω axis bug (col0 of BEM tables stores period T, not ω).  The correct
# resonance is computed from simulation_parameters/w in hinged_vgoswec_0.h5.

simulation:
  duration: 60.0
  timestep: 0.005
  wave_ramp: 10.0

body:
  flap:
    mesh: geometry/vgm45.obj
    mass: 6.676
    cog: [0.0, 0.0, -0.235]       # [m] hinge_z + r_g = -0.5 + 0.265
    inertia_xx: 0.32              # [kg·m²] CG roll inertia  (owner-provided, about CG)
    inertia_yy: 0.21             # [kg·m²] CG pitch inertia (WEC-Sim validated). Hinge inertia = I_cg + m·r_g² = 0.21 + 6.676·0.265² (≈0.469) = 0.652
    inertia_zz: 0.12              # [kg·m²] CG yaw inertia   (owner-provided, about CG)
  base:
    mesh: geometry/stl_files/center_beam_w_foundation_BEM.STL
    mass: 1.0e6
    cog: [0.0, 0.0, -0.7658]

hinge:
  position_z: -0.5      # [m] hinge/foundation reference (Table 1); foundation radius r_f = 0.05 m
  external_stiffness: 6.57  # [N·m/rad] experimental hinge spring (Table 1), applied at all times

hydro:
  h5_file: hydroData/vgoswec_0.h5            # time-domain (CG, 1-body) — unchanged
  impedance_h5_file: hydroData/hinged_vgoswec_0.h5   # hinge-referenced impedance for CC gains
  rho: 1025.0

wave:
  type: regular
  height: 0.05
  period: 6.33          # [s]  VGM-0 hinge resonance period (correct ω axis: T = 2π/0.9929)
  direction: 0.0

controller:
  type: cc
  # BuildController uses opt_passive.design_omega as the shared tuning frequency for
  # opt_passive/cc impedance-based gain calculations.
  opt_passive:
    design_omega: 0.9929   # [rad/s] hinge-frame resonance ω_n (K_r→0 at impedance match)
  cc:
    # K_r and B_r are computed automatically; override only if needed:
    # K_r_override: 0.0  # [N·m/rad]
    # B_r_override: 0.0  # [N·m·s/rad]
    theta_clip_rad: 1.0          # [rad] pitch clip; sweep keeps this fixed
    clip_torque: 1000000.0       # [N·m] effectively disabled; use theta_clip_rad instead
