# vgoswec_45_opt_passive.yaml
# Source: Ogden et al., ASME JOMAE 145(3):030905 (VGOSWEC-45 / VGM-45).
# VGM-45 free-decay reference: ωn = 1.84 rad/s, Ts = 3.42 s.
# Optimal passive damping at design frequency ω₀ = 1.84 rad/s (T₀ = 3.42 s).
#
# B_opt = |Z_intrinsic(ω₀)| where
#   Z_intrinsic = B_rad(ω) + i·(ω·(I_flap + A₅₅(ω)) − K_hs,55/ω)
#
# τ_pto = -B_opt · θ̇
#
# NOTE: B_opt is computed from H5 data at startup by impedance.h;
#       it is NOT specified here (it would override the computed value).

simulation:
  duration: 60.0
  timestep: 0.005
  wave_ramp: 10.0

body:
  flap:
    mesh: geometry/vgm45.obj
    mass: 6.676
    cog: [0.0, 0.0, -0.235]       # [m] hinge_z + r_g = -0.5 + 0.265
    inertia_xx: 0.32              # [kg·m²] CG roll inertia  (owner-provided, about CG)
    inertia_yy: 0.21             # [kg·m²] CG pitch inertia (WEC-Sim validated). Hinge inertia = I_cg + m·r_g² = 0.21 + 6.676·0.265² (≈0.469) = 0.652
    inertia_zz: 0.12              # [kg·m²] CG yaw inertia   (owner-provided, about CG)
    # Geometry/properties from Table 1: w=0.40 m, H_p=0.50 m, t=0.076 m, V=7395 cm^3, r_b=0.293 m.
  base:
    mesh: geometry/stl_files/center_beam_w_foundation_BEM.STL
    mass: 1.0e6
    cog: [0.0, 0.0, -0.7658]

hinge:
  position_z: -0.5      # [m] hinge/foundation reference (Table 1); foundation radius r_f = 0.05 m
  external_stiffness: 6.57  # [N·m/rad] experimental hinge spring (Table 1), applied at all times

hydro:
  h5_file: hydroData/vgoswec_45.h5
  rho: 1025.0

wave:
  type: regular
  height: 0.05
  period: 1.5
  direction: 0.0

controller:
  type: opt_passive
  opt_passive:
    design_omega: 1.84   # [rad/s] VGM-45 resonance (WEC-Sim free-decay reference, equiv. T = 3.42 s)
    clip_torque: 5.0    # [N·m]  TODO: tune with tank-test data
