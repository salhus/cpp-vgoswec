# vgoswec_20_cc.yaml
# Source: Ogden et al., ASME JOMAE 145(3):030905 (VGOSWEC-20 / VGM-20).
# Complex-conjugate (CC) reactive control for VGM-20.
# NOTE: design_omega below is a nominal default and is overridden per-period by
# scripts/cc_capture_efficiency_sweep.py (design_omega = 2π/T at each sweep point).
#
# τ = -K_r · θ  -  B_r · θ̇
#
# Gains computed from HydroData at startup (impedance.h):
#   K_r = ω₀² · (I_flap + A₅₅(ω₀)) - K_hs,55
#   B_r =  B_rad,55(ω₀)

simulation:
  duration: 60.0
  timestep: 0.005
  wave_ramp: 10.0

body:
  flap:
    mesh: geometry/vgm45.obj        # shared flap mesh across VGOSWEC angle variants
    mass: 6.676
    cog: [0.0, 0.0, -0.235]       # [m] hinge_z + r_g = -0.5 + 0.265
    inertia_xx: 0.32              # [kg·m²] CG roll inertia  (owner-provided, about CG)
    inertia_yy: 0.21             # [kg·m²] CG pitch inertia (WEC-Sim validated). Hinge inertia = I_cg + m·r_g² = 0.21 + 6.676·0.265² (≈0.469) = 0.652
    inertia_zz: 0.12              # [kg·m²] CG yaw inertia   (owner-provided, about CG)
    # Geometry/properties from Table 1: w=0.40 m, H_p=0.50 m, t=0.076 m, V=7395 cm^3, r_b=0.293 m.
  base:
    mesh: geometry/stl_files/center_beam_w_foundation_BEM.STL
    mass: 1.0e6
    cog: [0.0, 0.0, -0.7658]

hinge:
  position_z: -0.5      # [m] hinge/foundation reference (Table 1); foundation radius r_f = 0.05 m
  external_stiffness: 6.57  # [N·m/rad] experimental hinge spring (Table 1), applied at all times

hydro:
  h5_file: hydroData/vgoswec_20.h5
  impedance_h5_file: hydroData/hinged_vgoswec_20.h5
  rho: 1025.0

wave:
  type: regular
  height: 0.05
  period: 1.5
  direction: 0.0

controller:
  type: cc
  # BuildController uses opt_passive.design_omega as the shared tuning frequency for
  # opt_passive/cc impedance-based gain calculations.
  opt_passive:
    design_omega: 1.6396   # [rad/s] nominal default (overridden by cc capture-efficiency sweep)
  cc:
    # K_r and B_r are computed automatically; override only if needed:
    # K_r_override: 0.0  # [N·m/rad]
    # B_r_override: 0.0  # [N·m·s/rad]
    theta_clip_rad: 1.0          # [rad] pitch clip from CC pitch-clip update
    clip_torque: 1000000.0       # [N·m] effectively disabled; use theta_clip_rad instead
