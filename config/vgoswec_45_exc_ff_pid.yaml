# vgoswec_45_exc_ff_pid.yaml
# Source: Ogden et al., ASME JOMAE 145(3):030905 (VGOSWEC-45 / VGM-45).
# VGM-45 free-decay reference: ωn = 1.84 rad/s, Ts = 3.42 s.
# Active control: damping + excitation-force feedforward.
#
# τ = -B_ctrl · θ̇ + ff_gain · F_exc,pitch(t)  (clamped)
#
# The −B_ctrl·θ̇ term is guaranteed dissipative (cannot inject energy).
# The ff_gain·F_exc term adds Korde-style phase anticipation using the
# real-time pitch excitation torque from ExcitationForceProvider.
# ff_gain = 0 reduces to a pure passive damper.

simulation:
  duration: 60.0
  timestep: 0.005
  wave_ramp: 10.0

body:
  flap:
    mesh: geometry/vgm45.obj
    mass: 6.676
    cog: [0.0, 0.0, -0.235]       # [m] hinge_z + r_g = -0.5 + 0.265
    inertia_xx: 0.32              # [kg·m²] CG roll inertia  (owner-provided, about CG)
    inertia_yy: 0.21             # [kg·m²] CG pitch inertia (WEC-Sim validated). Hinge inertia = I_cg + m·r_g² = 0.21 + 6.676·0.265² (≈0.469) = 0.652
    inertia_zz: 0.12              # [kg·m²] CG yaw inertia   (owner-provided, about CG)
    # Geometry/properties from Table 1: w=0.40 m, H_p=0.50 m, t=0.076 m, V=7395 cm^3, r_b=0.293 m.
  base:
    mesh: geometry/stl_files/center_beam_w_foundation_BEM.STL
    mass: 1.0e6
    cog: [0.0, 0.0, -0.7658]

hinge:
  position_z: -0.5      # [m] hinge/foundation reference (Table 1); foundation radius r_f = 0.05 m
  external_stiffness: 6.57  # [N·m/rad] experimental hinge spring (Table 1), applied at all times

hydro:
  h5_file: hydroData/vgoswec_45.h5
  rho: 1025.0

wave:
  type: regular
  height: 0.05
  period: 1.5
  direction: 0.0
  # For irregular waves (JONSWAP):
  # type: jonswap
  # height: 0.05   # Hs [m]
  # period: 1.5    # Tp [s]
  # gamma: 3.3
  # n_components: 200
  # seed: 42

controller:
  type: exc_ff_pid
  exc_ff_pid:
    B_ctrl:  0.5        # [N·m·s/rad] control damping (dissipative; guarantees stability). TODO tune.
    ff_gain: 0.0        # [-] excitation feedforward gain (Korde-style anticipation). Start 0; raise carefully. TODO tune.
    clip_torque: 5.0    # [N·m] output saturation
