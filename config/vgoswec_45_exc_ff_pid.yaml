# vgoswec_45_exc_ff_pid.yaml
# Source: Ogden et al., ASME JOMAE 145(3):030905 (VGOSWEC-45 / VGM-45).
# VGM-45 free-decay reference: ωn = 1.84 rad/s, Ts = 3.42 s.
# Active control: stabilized velocity-tracking absorber.
#
# τ = -B_ctrl · θ̇ + PID_vel(alpha · F_exc,pitch(t) - θ̇)   (clamped)

simulation:
  duration: 60.0
  timestep: 0.005
  wave_ramp: 10.0

body:
  flap:
    mesh: geometry/vgm45.obj
    mass: 6.676
    cog: [0.0, 0.0, -0.235]       # [m] hinge_z + r_g = -0.5 + 0.265
    inertia_xx: 0.32              # [kg·m²] CG roll inertia  (owner-provided, about CG)
    inertia_yy: 0.21             # [kg·m²] CG pitch inertia (WEC-Sim validated). Hinge inertia = I_cg + m·r_g² = 0.21 + 6.676·0.265² (≈0.469) = 0.652
    inertia_zz: 0.12              # [kg·m²] CG yaw inertia   (owner-provided, about CG)
    # Geometry/properties from Table 1: w=0.40 m, H_p=0.50 m, t=0.076 m, V=7395 cm^3, r_b=0.293 m.
  base:
    mesh: geometry/stl_files/center_beam_w_foundation_BEM.STL
    mass: 1.0e6
    cog: [0.0, 0.0, -0.7658]

hinge:
  position_z: -0.5      # [m] hinge/foundation reference (Table 1); foundation radius r_f = 0.05 m
  external_stiffness: 6.57  # [N·m/rad] experimental hinge spring (Table 1), applied at all times

hydro:
  h5_file: hydroData/vgoswec_45.h5
  rho: 1025.0

wave:
  type: regular
  height: 0.05
  period: 1.5
  direction: 0.0
  # For irregular waves (JONSWAP):
  # type: jonswap
  # height: 0.05   # Hs [m]
  # period: 1.5    # Tp [s]
  # gamma: 3.3
  # n_components: 200
  # seed: 42

controller:
  type: exc_ff_pid
  exc_ff_pid:
    B_ctrl: 0.5       # [N·m·s/rad] stability damping floor (dissipative; guarantees stability). TODO tune.
    alpha: -2.0       # [(rad/s)/(N·m)] SIGNED velocity-reference gain, vel_ref = alpha*F_exc. Negative accounts for hinge-referred excitation sign. TODO tune.
    clip_torque: 5.0  # [N·m] output saturation (final torque)
    vel_pid:
      kp: 1.0         # [N·m per (rad/s)] velocity-error proportional gain. TODO tune.
      ki: 0.0         # TODO tune
      kd: 0.0         # TODO tune
      tau_d: 0.02     # [s] derivative filter time constant
      u_min: -5.0     # [N·m] clamp on PID term
      u_max: 5.0      # [N·m] clamp on PID term
