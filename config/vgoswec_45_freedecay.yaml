# vgoswec_45_freedecay.yaml
# Source: Ogden et al., ASME JOMAE 145(3):030905 (VGOSWEC-45 / VGM-45).
# Purpose: spring-only free-decay validation (no waves) to recover VGM-45 resonance:
#   ωn ≈ 1.84 rad/s, Ts ≈ 3.42 s, ζ ≈ 3.5e-4.
# The external hinge spring (external_stiffness: 6.57 N·m/rad, Table 1) is the
# sole restoring mechanism.  It is applied via a dedicated RSDA in the physics
# (not via CC K_r_override) to avoid double-counting.
# Controller: passive with B_pto=0 → zero PTO torque → pure free oscillation.
# Only hydrodynamic radiation damping and the spring act; structural damping is
# negligible at model scale, so the decay envelope is determined by B55 ≈ 0 at
# the resonance notch — expect very low damping (high Q).

simulation:
  duration: 40.0       # [s] >= 30 s to observe several free-decay cycles
  timestep: 0.005      # [s]
  wave_ramp: 0.0       # [s] no incident-wave forcing

body:
  flap:
    mesh: geometry/vgm45.obj
    mass: 6.30
    cog: [0.0, 0.0, -0.226]       # [m] hinge_z + r_g = -0.5 + 0.274
    inertia_xx: 0.32              # [kg·m²] CG roll inertia  (owner-provided, about CG)
    inertia_yy: 0.489             # [kg·m²] CG pitch inertia derived from paper: I_cg = I_55(hinge) − m·r_g² = 0.962 − 6.30·0.274² = 0.489 kg·m²
    inertia_zz: 0.12              # [kg·m²] CG yaw inertia   (owner-provided, about CG)
    initial_pitch: 0.15           # [rad] nonzero initial displacement for free decay
    # Geometry/properties from Table 1: w=0.40 m, H_p=0.50 m, t=0.076 m, V=7395 cm^3, r_b=0.293 m.
  base:
    mesh: geometry/stl_files/center_beam_w_foundation_BEM.STL
    mass: 1.0e6
    cog: [0.0, 0.0, -0.7658]

hinge:
  position_z: -0.5      # [m] hinge/foundation reference (Table 1); foundation radius r_f = 0.05 m
  external_stiffness: 6.57  # [N·m/rad] experimental hinge spring (Table 1), single source of truth

hydro:
  h5_file: hydroData/vgoswec_45.h5
  rho: 1025.0

wave:
  type: none          # NoWave: zero excitation; hydrostatics and radiation still act

controller:
  type: passive
  passive:
    B_pto: 0.0         # [N·m·s/rad] zero PTO damping — spring-only free decay
    clip_torque: 20.0  # [N·m] keep unclipped over small-angle free-decay response
