# vgoswec_20_passive.yaml
# Source: Ogden et al., ASME JOMAE 145(3):030905 (VGOSWEC-20 / VGM-20).
# VGM-20 free-decay reference: ωn = 1.568 rad/s, Ts = 4.01 s.
# Baseline: linear viscous damper on the hinge.
#
# τ_pto = -B_pto · θ̇
# Absorbed power: P_abs = -τ_pto · θ̇ (positive = extracted from waves)

simulation:
  duration: 60.0      # [s]
  timestep: 0.005     # [s]
  wave_ramp: 10.0     # [s] linear ramp duration

body:
  flap:
    mesh: geometry/vgm45.obj  # same hull shape; geometry/vgm0.obj not required for BEM runs
    mass: 6.676                    # [kg] Table 1 body mass (model scale)
    cog: [0.0, 0.0, -0.235]       # [m] hinge_z + r_g = -0.5 + 0.265
    inertia_xx: 0.32              # [kg·m²] CG roll inertia  (owner-provided, about CG)
    inertia_yy: 0.21             # [kg·m²] CG pitch inertia (WEC-Sim validated). Hinge inertia = I_cg + m·r_g² = 0.21 + 6.676·0.265² (≈0.469) = 0.652
    inertia_zz: 0.12              # [kg·m²] CG yaw inertia   (owner-provided, about CG)
    # Geometry/properties from Table 1 (same physical device, different angle).
  base:
    mesh: geometry/stl_files/center_beam_w_foundation_BEM.STL
    mass: 1.0e6                   # [kg]  dummy; base is constrained to ground
    cog: [0.0, 0.0, -0.7658]     # [m]

hinge:
  position_z: -0.5      # [m] hinge/foundation reference (Table 1); foundation radius r_f = 0.05 m
  external_stiffness: 6.57  # [N·m/rad] experimental hinge spring (Table 1), applied at all times

hydro:
  h5_file: hydroData/vgoswec_20.h5
  rho: 1025.0          # [kg/m³]  seawater

wave:
  type: regular         # regular | jonswap
  height: 0.05          # [m]  H for regular, Hs for JONSWAP
  period: 4.01          # [s]  VGM-20 resonance period (WEC-Sim free-decay reference)
  direction: 0.0        # [rad]  wave direction (0 = +x)

controller:
  type: passive
  passive:
    # B_pto = B55(ω₀) = 1.5118e-4 N·m·s/rad (radiation damping at free-decay resonance ω₀=1.568 rad/s)
    # Computed: λ55(ω₀)·ρ_h5·ω₀ = 9.6416e-8 · 1000.0 · 1.568 (from hydroData/vgoswec_20.h5)
    B_pto: 1.5118e-4    # [N·m·s/rad]  radiation damping at resonance
    clip_torque: 5.0    # [N·m]  output saturation limit
