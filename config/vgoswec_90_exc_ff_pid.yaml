# vgoswec_90_exc_ff_pid.yaml
# Source: Ogden et al., ASME JOMAE 145(3):030905 (VGOSWEC-90 / VGM-90).
# VGM-90 free-decay reference: ωn = 2.10 rad/s, Ts = 2.99 s.
# Active control: stabilized velocity-tracking absorber with passive-safety guard.
#
# τ = clamp( -B_ctrl · θ̇ + PID_vel(alpha · F_exc,pitch(t) - θ̇), -clip, clip )
# Passive-safety guard (passive_safe: true): if tau·θ̇ > 0 (would inject energy),
#   replace tau with the dissipative floor: -B_ctrl · θ̇.
#
# Fixed parameters (empirically determined — see docs/CONTROLLERS.md):
#   alpha = 11  (universal across all 5 flap angles; reaches diminishing-returns
#               knee with max|pitch| < 0.8 rad at both band edges)
#   ki    = 5   (fixed integral gain; integral wind-up is bounded by u_min/u_max)
#
# Tuned parameters (Kp×Kd sweep, band 2.0–5.0 s, see analysis/kpkd_sweep_VGM90.csv):
#   kp = 4, kd = 2  (higher Kd vs lower-frequency flaps: VGM-90 has the shortest
#                    resonance period and needs more derivative damping to keep the
#                    short-period band edge stable; kd=1 was marginal, kd=2 gives
#                    healthy corr < 0 at T=2.0 s without sacrificing resonance capture)
#
# Known limitation: F_exc is the raw un-hinge-referred pitch moment (moment.y()
# from ExcitationForceProvider). alpha is signed positive to paper over the
# resulting phase/sign mismatch. Empirically this yields positive capture but
# the capture peak sits below each flap's resonance and the controller injects
# energy at short periods — which the passive_safe guard is designed to contain.
# See docs/CONTROLLERS.md §Known limitations for full discussion.

simulation:
  duration: 171.0      # [s] ≥ 57 × T_res = 171 s at 2.99 s resonance
  timestep: 0.005
  wave_ramp: 10.0

body:
  flap:
    mesh: geometry/vgm45.obj
    mass: 6.676
    cog: [0.0, 0.0, -0.235]       # [m] hinge_z + r_g = -0.5 + 0.265
    inertia_xx: 0.32              # [kg·m²] CG roll inertia  (owner-provided, about CG)
    inertia_yy: 0.21              # [kg·m²] CG pitch inertia (WEC-Sim validated). Hinge inertia = I_cg + m·r_g² = 0.21 + 6.676·0.265² (≈0.469) = 0.652
    inertia_zz: 0.12              # [kg·m²] CG yaw inertia   (owner-provided, about CG)
  base:
    mesh: geometry/stl_files/center_beam_w_foundation_BEM.STL
    mass: 1.0e6
    cog: [0.0, 0.0, -0.7658]

hinge:
  position_z: -0.5      # [m] hinge/foundation reference (Table 1); foundation radius r_f = 0.05 m
  external_stiffness: 6.57  # [N·m/rad] experimental hinge spring (Table 1), applied at all times

hydro:
  h5_file: hydroData/vgoswec_90.h5
  rho: 1025.0

wave:
  type: regular
  height: 0.05
  period: 2.99          # [s]  VGM-90 resonance period (WEC-Sim free-decay reference)
  direction: 0.0

controller:
  type: exc_ff_pid
  exc_ff_pid:
    B_ctrl: 0.5         # [N·m·s/rad] stability damping floor (always dissipative)
    alpha: 11.0         # [(rad/s)/(N·m)] velocity-reference gain (empirically universal; see header)
    clip_torque: 10.0   # [N·m] output saturation (final torque)
    passive_safe: true  # replace injecting commands with dissipative floor -B_ctrl·vel
    vel_pid:
      kp: 4.0           # [N·m per (rad/s)] tuned; optimal Kp×Kd from band-integrated sweep (2.0–5.0 s)
      ki: 5.0           # [N·m/(rad/s·s)] fixed (see header rationale)
      kd: 2.0           # [N·m·s/(rad/s)] tuned; higher than lower-frequency flaps (see header)
      tau_d: 0.02       # [s] derivative filter time constant
      u_min: -10.0      # [N·m] clamp on PID term
      u_max: 10.0       # [N·m] clamp on PID term
